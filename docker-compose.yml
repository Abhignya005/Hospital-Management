version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hospital_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: hospital_management
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - hospital_network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  hospital_network:
    driver: bridge
